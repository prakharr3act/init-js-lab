<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      color: white;
      background-color: #222;
      font-family: Arial, Helvetica, sans-serif;
    }

    div{
      background-color: white;
      color: black;
      height: 200px;
      width: 300px;
      margin: 150px auto;
      padding: 20px 30px;
      border: 1px solid goldenrod;
      border-radius: 12px;
      position: relative;
    }

    button{
      position: absolute;
      top: 12px;
      right: 12px;
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    h1{
      margin-top: 40px;
      font-size: 28px;
      line-height: 1.3;
      font-family: 'Courier New', Courier, monospace;
    }
  </style>
</head>

<body>

  <div>
    <button>X</button>
    <h1>You have been logged out</h1>
  </div>

</body>

<script src="timersInt.js"></script>
</html>
