<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Archive - Wikipedia Style</title>
  <link rel="stylesheet" href="usrcd.css">
</head>

<body>

  <header>
    <h1>User Archive</h1>
    <p>Create and manage user cards</p>
    <hr>
  </header>

  <aside class="sidebar">
    <h2>Create User</h2>
    <br>

    <form>

      <label>Name</label>
      <input type="text" id="name" placeholder="Enter full name">

      <label>Age</label>
      <input type="text" id="age" placeholder="Enter age">

      <label>Email</label>
      <input type="text" id="email" placeholder="Enter email">

      <label>Profile Picture</label>
      <input type="text" id="profilePic" placeholder="Paste image URL">

      <br>

      <input type="submit" id="submitBtn" value="Create User">

    </form>

    <br>
    <hr>
    <br>

    <p class="info">
      This page stores user profile cards .
    </p>
  </aside>
