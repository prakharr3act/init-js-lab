<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Mona_Lisa.jpg" alt="Mona Lisa">

    <div class="info">
      <h2>System Overview</h2>

      <div class="row">
        <span>Status</span>
        <span>ACTIVE</span>
      </div>

      <div class="row">
        <span>IP Address</span>
        <span>192.168.1.45</span>
      </div>

      <div class="row">
        <span>Server</span>
        <span>Node-X21</span>
      </div>

      <div class="row">
        <span>Latency</span>
        <span>12ms</span>
      </div>

      <div class="row">
        <span>Encryption</span>
        <span>AES-256</span>
      </div>
    </div>
  </div>

</body>
<script src="autBnr.js">
</script>
</html>
