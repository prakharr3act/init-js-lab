<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Panel</title>
  <link rel="stylesheet" href="autBnr.css">
</head>
<body>

  <div class="card">
    
    <div class="top">
      <div class="title">SYSTEM DETAILS</div>
      <div class="percent">ONLINE</div>
    </div>

    <img src="/WhiteCollar Inc.png" class="img">

    <div class="details">
      <div class="row">
        <span>SERVER</span>
        <span>NODE-X91</span>
      </div>

      <div class="row">
        <span>LATENCY</span>
        <span>12MS</span>
      </div>

      <div class="row">
        <span>ENCRYPTION</span>
        <span>AES-256</span>
      </div>

      <div class="row">
        <span>LOCATION</span>
        <span>EU-WEST</span>
      </div>
    </div>

    <div class="progress">
      <div class="bar"></div>
    </div>

  </div>

</body>
<script src="autBnr.js"></script>
</html>
